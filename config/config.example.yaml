server:
  port: 8088

# API 访问令牌。留空则不鉴权（开放，适用于内网隔离部署）。
# 配置后，所有控制台与管控 API（除 Alertmanager webhook 外）需携带
# Authorization: Bearer <token> 或 ?token=<token>
api:
  token: ""

# 屏蔽规则持久化路径（支持按时间段屏蔽）
mute:
  store_path: data/mutes.json

# 通知历史持久化（通知/屏蔽/抑制/恢复事件），重启后历史保留
history:
  store_path: data/history.log
  retention: 720h   # 保留 30 天，超期自动裁剪

aggregation:
  # 距上次告警空闲这么久才刷出（防抖，方便多个站点陆续到达后合并）
  wait_time: 30s
  # 从第一条告警起最长等待，到点强制发送
  max_wait: 90s

blackbox:
  enabled: true
  domain_threshold:
    critical: 2

host_failure:
  critical_alerts:
    - NodeDown
    - TargetDown
    - PrometheusTargetMissing
    - InstanceDown

severity:
  rules:
    - condition:
        domain_count: ">=2"
      level: critical

notification:
  cluster: xinghui_Prometheus
  max_items: 10
  # 相同 alertname 在冷却期内不重复推送（无新增实例时）
  cooldown: 1h
  # 是否发送告警恢复通知（需 Alertmanager send_resolved: true）
  send_resolved: true
  retry:
    count: 3
    interval: 5s
  channels:
    feishu:
      enabled: true
      webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/xxxx
    dingtalk:
      enabled: false
      webhook_url: https://oapi.dingtalk.com/robot/send?access_token=xxxx
    wechat:
      enabled: false
      webhook_url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxx
